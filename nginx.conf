# ── SwiftDeploy — generated by `swiftdeploy init` — DO NOT EDIT BY HAND ──

upstream swiftdeploy_backend {
    server service:3000;
    keepalive 32;
}

# Access log: ISO8601 | status | request_time | upstream_addr | request
log_format swiftdeploy_fmt '$time_iso8601 | $status | ${request_time}s | $upstream_addr | $request';

server {
    listen 8080;
    server_name _;

    access_log /var/log/nginx/access.log swiftdeploy_fmt;
    error_log  /var/log/nginx/error.log  warn;

    # ── Timeouts ──────────────────────────────────────────────────────────
    proxy_connect_timeout 30s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # ── JSON error pages for 502 / 503 / 504 ──────────────────────────────
    error_page 502 @error_502;
    error_page 503 @error_503;
    error_page 504 @error_504;

    location @error_502 {
        default_type application/json;
        add_header   Content-Type  "application/json" always;
        add_header   X-Deployed-By swiftdeploy        always;
        return 502 '{"error":"Bad Gateway","code":502,"service":"service","contact":"admin@swiftdeploy.local"}';
    }

    location @error_503 {
        default_type application/json;
        add_header   Content-Type  "application/json" always;
        add_header   X-Deployed-By swiftdeploy        always;
        return 503 '{"error":"Service Unavailable","code":503,"service":"service","contact":"admin@swiftdeploy.local"}';
    }

    location @error_504 {
        default_type application/json;
        add_header   Content-Type  "application/json" always;
        add_header   X-Deployed-By swiftdeploy        always;
        return 504 '{"error":"Gateway Timeout","code":504,"service":"service","contact":"admin@swiftdeploy.local"}';
    }

    # ── Proxy ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://swiftdeploy_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Inject deployment identity header
        add_header         X-Deployed-By swiftdeploy always;

        # Forward X-Mode header set by upstream (canary signal)
        proxy_pass_header  X-Mode;

        # Hide upstream version leakage
        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;
    }
}
