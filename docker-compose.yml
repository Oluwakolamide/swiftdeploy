# ── SwiftDeploy — generated by `swiftdeploy init` — DO NOT EDIT BY HAND ──

services:

  # ── Application service ─────────────────────────────────────────────────
  service:
    image: swift-deploy-1-node:latest
    container_name: swiftdeploy-service
    restart: unless-stopped

    environment:
      - MODE=canary
      - APP_VERSION=1.0.0
      - APP_PORT=3000

    networks:
      - swiftdeploy-net

    volumes:
      - swiftdeploy-logs:/logs

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/healthz')\""  ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    user: "1001:1001"
    cap_drop:
      - ALL
    cap_add: []
    security_opt:
      - no-new-privileges:true

    # NOTE: service port is NOT mapped to the host — all traffic via nginx
    expose:
      - "3000"

  # ── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:latest
    container_name: swiftdeploy-nginx
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - swiftdeploy-logs:/var/log/nginx

    networks:
      - swiftdeploy-net

    depends_on:
      service:
        condition: service_healthy

  # ── OPA policy sidecar ───────────────────────────────────────────────────
  # Reachable by the CLI (127.0.0.1:8181) but isolated from public nginx ingress.
  # Nginx only proxies to 'service' — OPA is never in its upstream.
  opa:
    image: openpolicyagent/opa:edge-static
    container_name: swiftdeploy-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=error"
      - "--watch"
      - "/policies"

    volumes:
      - ./policies:/policies:ro

    # Bound to 127.0.0.1 only — not reachable externally, not via nginx
    ports:
      - "127.0.0.1:8181:8181"

    networks:
      - swiftdeploy-net

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8181/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

# ── Network ──────────────────────────────────────────────────────────────────
networks:
  swiftdeploy-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  swiftdeploy-logs:
    driver: local
